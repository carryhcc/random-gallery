<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机图库</title>

    <!-- PWA 配置 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#5b7fff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="随机图库">

    <!-- iOS 图标 -->
    <link rel="apple-touch-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico">

    <!-- Android Chrome -->
    <link rel="icon" type="image/x-icon" sizes="192x192" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/web.css" media="(min-width: 769px)">
    <link rel="stylesheet" href="/css/mobile.css" media="(max-width: 768px)">
    <script src="/js/theme.js"></script>
    <!-- PWA 配置 - 放在 Head 以确保尽早捕获事件 -->
    <script>
        // PWA 安装事件监听
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            deferredPrompt = e;
            console.log('PWA 可以安装到主屏幕');
            if (document.body) {
                showInstallButton();
            } else {
                document.addEventListener('DOMContentLoaded', showInstallButton);
            }
        });

        window.addEventListener('appinstalled', () => {
            console.log('PWA 已成功安装到主屏幕');
            if (window.showToast) {
                showToast('应用已安装到主屏幕！', 'success');
            }
            const installHint = document.getElementById('pwa-install-hint');
            if (installHint) installHint.remove();
        });

        function showInstallButton() {
            if (document.getElementById('pwa-install-hint')) return;
            const installHint = document.createElement('div');
            installHint.id = 'pwa-install-hint';
            installHint.innerHTML = `
        <div style="position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); 
                    background: var(--seed-primary, #5b7fff); 
                    color: white; padding: 12px 24px; border-radius: 30px; 
                    box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; 
                    z-index: 9999; animation: fadeInUp 0.5s cubic-bezier(0.22,1,0.36,1); 
                    font-size: 14px; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.15);">
            <i class="fas fa-download"></i>
            <span style="font-weight: 600;">安装应用</span>
        </div>
    `;
            installHint.onclick = () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            console.log('用户接受了安装');
                        }
                        deferredPrompt = null;
                        installHint.remove();
                    });
                }
            };
            document.body.appendChild(installHint);
            setTimeout(() => {
                if (installHint.parentNode) {
                    installHint.style.opacity = '0';
                    installHint.style.transition = 'opacity 0.5s';
                    setTimeout(() => installHint.remove(), 500);
                }
            }, 15000);
        }

        // Service Worker 注册
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                        registration.update();
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    if (confirm('发现新版本，是否立即更新？')) {
                                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.error('Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
</head>

<body class="index-page">

    <!-- 导航栏 -->
    <header class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">
                <i class="fas fa-images"></i>
                <span>随机图库</span>
            </div>
            <div class="navbar-actions">
                <!-- 环境切换器 -->
                <div class="env-selector" id="env-component" onclick="toggleDropdown()">
                    <i class="fas fa-circle" style="font-size:6px; color:var(--seed-primary);"></i>
                    <span id="selected-env-text" class="env-badge">加载中...</span>
                    <i class="fas fa-chevron-down" style="font-size:.6rem;"></i>
                    <div class="env-dropdown-list" id="env-dropdown-menu">
                        <a href="#" data-env="dev" class="env-dropdown-option"
                            onclick="selectEnvironment('dev'); event.stopPropagation();">开发环境</a>
                        <a href="#" data-env="test" class="env-dropdown-option"
                            onclick="selectEnvironment('test'); event.stopPropagation();">测试环境</a>
                        <a href="#" data-env="prod" class="env-dropdown-option"
                            onclick="selectEnvironment('prod'); event.stopPropagation();">生产环境</a>
                    </div>
                </div>
                <!-- 隐私模式 -->
                <button class="btn btn-secondary btn-sm" id="privacyToggle" onclick="togglePrivacy()" title="隐私模式">
                    <i class="fas fa-eye" id="privacyIcon"></i>
                </button>
                <!-- 主题切换 -->
                <button class="btn btn-secondary btn-sm" id="themeToggle" onclick="toggleTheme()" title="切换主题">
                    <i class="fas fa-sun" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="main-container">

        <!-- 模块一：本地图库 -->
        <div class="card module-card animate-fade-in">
            <div class="card-header">
                <div class="header-main">
                    <h2 class="card-title"><i class="fas fa-server"></i> 本地图库</h2>
                </div>
                <p class="env-stats" id="envStats">
                    <span class="loading-text"><i class="fas fa-spinner fa-spin"></i> 数据同步中...</span>
                </p>
            </div>

            <div class="button-grid">
                <a href="/showPic" class="action-card primary">
                    <div class="icon-box"><i class="fas fa-random"></i></div>
                    <span class="label">随机图片</span>
                </a>
                <a href="/randomGallery" class="action-card warm">
                    <div class="icon-box"><i class="fas fa-th-large"></i></div>
                    <span class="label">随机画廊</span>
                </a>
                <a href="#" id="randomGroupBtn" class="action-card accent">
                    <div class="icon-box"><i class="fas fa-layer-group"></i></div>
                    <span class="label">随机套图</span>
                </a>
                <a href="/groupList" class="action-card neutral">
                    <div class="icon-box"><i class="fas fa-list-ul"></i></div>
                    <span class="label">分组列表</span>
                </a>
            </div>
        </div>

        <!-- 模块二：精选收藏 -->
        <div class="card module-card animate-fade-in delay-100">
            <div class="card-header">
                <div class="header-main">
                    <h2 class="card-title"><i class="fas fa-cloud-download-alt"></i> 精选收藏</h2>
                </div>
            </div>

            <div class="button-grid">
                <a href="/randomGif" class="action-card success" id="randomGifBtn">
                    <div class="icon-box"><i class="fas fa-film"></i></div>
                    <span class="label">随机动图</span>
                </a>
                <a href="/downloadList" class="action-card info">
                    <div class="icon-box"><i class="fas fa-images"></i></div>
                    <span class="label">下载浏览</span>
                </a>
                <a href="/download" class="action-card warning" style="grid-column: span 2;">
                    <div class="icon-box"><i class="fas fa-file-download"></i></div>
                    <span class="label">图片下载管理</span>
                </a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let toastTimer;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            clearTimeout(toastTimer);
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            toastTimer = setTimeout(function () {
                toast.className = 'toast';
            }, 3000);
        }

        // Dropdown Logic
        function toggleDropdown() {
            const selector = document.getElementById('env-component');
            selector.classList.toggle('active');
        }

        function selectEnvironment(targetEnv) {
            const selector = document.getElementById('env-component');
            selector.classList.remove('active');
            switchEnvironment(targetEnv);
        }

        window.onclick = function (event) {
            const selector = document.getElementById('env-component');
            if (selector && !selector.contains(event.target)) {
                selector.classList.remove('active');
            }
        }

        async function updateEnvStatus() {
            try {
                const response = await fetch('/api/system/env/currentInfo');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const result = await response.json();
                const data = result.data;
                const currentEnv = data.env;

                const selectedEnvText = document.getElementById('selected-env-text');
                const envMap = { dev: '开发环境', test: '测试环境', prod: '生产环境' };
                selectedEnvText.textContent = envMap[currentEnv] || "未知环境";

                document.querySelectorAll('.env-dropdown-option').forEach(item => {
                    if (item.dataset.env === currentEnv) item.classList.add('active');
                    else item.classList.remove('active');
                });

                const envStats = document.getElementById('envStats');
                envStats.innerHTML = `
                    <i class="fas fa-database"></i> 分组: ${data.groupCount || 0}
                    <span style="margin: 0 8px; color: var(--seed-border);">|</span>
                    <i class="fas fa-image"></i> 图片: ${data.picCount || 0}
                `;

            } catch (error) {
                console.error("Failed to get env status:", error);
                document.getElementById('selected-env-text').textContent = "获取失败";
                document.getElementById('envStats').innerHTML = '<span style="color:var(--danger);">无法连接服务器</span>';
            }
        }

        async function switchEnvironment(targetEnv) {
            const envMap = { dev: '开发环境', test: '测试环境', prod: '生产环境' };
            showToast(`正在切换到 ${envMap[targetEnv] || targetEnv}...`, 'info');
            try {
                const response = await fetch('/api/system/env/' + targetEnv);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const result = await response.json();
                if (result.code === 200) {
                    await updateEnvStatus();
                    showToast(`环境已切换`, 'success');
                } else {
                    throw new Error(result.message || '切换失败');
                }
            } catch (error) {
                console.error("Switch env failed:", error);
                showToast("切换失败: " + error.message, "error");
            }
        }

        document.addEventListener('DOMContentLoaded', updateEnvStatus);

        document.getElementById('randomGroupBtn').addEventListener('click', function (e) {
            e.preventDefault();
            fetch('/api/group/randomGroupInfo')
                .then(response => response.json())
                .then(result => {
                    if (result.code === 200 && result.data && result.data.groupId) {
                        window.location.href = '/showPicList?groupId=' + result.data.groupId + '&groupName=' + encodeURIComponent(result.data.groupName || '随机套图');
                    } else {
                        window.location.href = '/showPicList';
                    }
                })
                .catch(() => window.location.href = '/showPicList');
        });

        // Theme Toggle
        function toggleTheme() {
            const newTheme = window.themeManager.toggle();
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const themeIcon = document.getElementById('themeIcon');
            if (themeIcon) {
                themeIcon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
                themeIcon.parentElement.title = theme === 'light' ? '切换到深色模式' : '切换到浅色模式';
            }
        }

        // Privacy Mode Toggle
        async function togglePrivacy() {
            try {
                const btn = document.getElementById('privacyToggle');
                const icon = document.getElementById('privacyIcon');
                const isEnabled = icon.classList.contains('fa-eye');

                const response = await fetch('/api/system/privacy-mode?enabled=' + isEnabled);
                if (response.ok) {
                    const result = await response.json();
                    if (result.code === 200) {
                        updatePrivacyIcon(isEnabled);
                        showToast(result.message, 'success');
                    } else {
                        showToast(result.message || '操作失败', 'error');
                    }
                }
            } catch (error) {
                console.error("Toggle privacy failed:", error);
                showToast("操作失败", 'error');
            }
        }

        function updatePrivacyIcon(privacyEnabled) {
            const btn = document.getElementById('privacyToggle');
            const icon = document.getElementById('privacyIcon');
            const gifBtn = document.getElementById('randomGifBtn');

            if (privacyEnabled) {
                icon.className = 'fas fa-eye-slash';
                btn.classList.add('active');
                icon.style.color = 'var(--danger)';
                btn.title = "关闭隐私模式";
                gifBtn.classList.add('disabled');
                gifBtn.removeAttribute('href');
            } else {
                icon.className = 'fas fa-eye';
                btn.classList.remove('active');
                icon.style.color = '';
                btn.title = "开启隐私模式";
                gifBtn.classList.remove('disabled');
                gifBtn.setAttribute('href', '/randomGif');
            }
        }

        async function initPrivacyStatus() {
            try {
                const response = await fetch('/api/system/privacy-mode');
                if (response.ok) {
                    const result = await response.json();
                    if (result.code === 200) {
                        updatePrivacyIcon(result.data);
                    }
                }
            } catch (e) { }
        }

        document.addEventListener('DOMContentLoaded', function () {
            updateThemeIcon(window.themeManager.get());
            initPrivacyStatus();
        });
    </script>
</body>

</html>
