<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机图库 - 专业图片浏览平台</title>

    <!-- PWA 配置 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#a58f80">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="随机图库">

    <!-- iOS 图标 -->
    <link rel="apple-touch-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico">

    <!-- Android Chrome -->
    <link rel="icon" type="image/x-icon" sizes="192x192" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/web.css" media="(min-width: 769px)">
    <link rel="stylesheet" href="/css/mobile.css" media="(max-width: 768px)">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/pages/index-web.css" media="(min-width: 769px)">
    <link rel="stylesheet" href="/css/pages/index-mobile.css" media="(max-width: 768px)">
    <!-- PWA 配置 - 放在 Head 以确保尽早捕获事件 -->
    <script>
        // PWA 安装事件监听
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            // e.preventDefault(); // 允许浏览器显示原生安装提示
            deferredPrompt = e;
            console.log('💡 PWA 可以安装到主屏幕 (UI事件触发)');

            // 确保DOM准备好后再显示按钮
            if (document.body) {
                showInstallButton();
            } else {
                document.addEventListener('DOMContentLoaded', showInstallButton);
            }
        });

        // PWA 安装成功监听
        window.addEventListener('appinstalled', () => {
            console.log('✅ PWA 已成功安装到主屏幕');
            // 如果 toast 函数未定义（DOM未就绪），则等待
            if (window.showToast) {
                showToast('应用已安装到主屏幕！', 'success');
            }
            const installHint = document.getElementById('pwa-install-hint');
            if (installHint) installHint.remove();
        });

        function showInstallButton() {
            // 避免重复添加
            if (document.getElementById('pwa-install-hint')) return;

            console.log('📱 显示自定义安装按钮');
            const installHint = document.createElement('div');
            installHint.id = 'pwa-install-hint';
            installHint.innerHTML = `
        <div style="position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); 
                    background: linear-gradient(135deg, #a58f80 0%, #cf8b72 100%); 
                    color: white; padding: 12px 24px; border-radius: 30px; 
                    box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; 
                    z-index: 9999; animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
                    font-size: 14px; display: flex; align-items: center; gap: 8px; border: 2px solid rgba(255,255,255,0.2);">
            <i class="fas fa-download"></i>
            <span style="font-weight: 600;">安装应用</span>
        </div>
    `;

            const style = document.createElement('style');
            style.textContent = '@keyframes slideUp { from { opacity: 0; transform: translate(-50%, 40px); } to { opacity: 1; transform: translate(-50%, 0); } }';
            document.head.appendChild(style);

            installHint.onclick = () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            console.log('✅ 用户接受了安装');
                        } else {
                            console.log('❌ 用户拒绝了安装');
                        }
                        deferredPrompt = null;
                        installHint.remove();
                    });
                } else {
                    console.warn('Deferred prompt is null');
                }
            };

            document.body.appendChild(installHint);

            // 15秒后自动消失
            setTimeout(() => {
                if (installHint.parentNode) {
                    installHint.style.opacity = '0';
                    installHint.style.transition = 'opacity 0.5s';
                    setTimeout(() => installHint.remove(), 500);
                }
            }, 15000);
        }

        // Service Worker 注册
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('✅ Service Worker 注册成功:', registration.scope);

                        // 强制更新检查
                        registration.update();

                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    if (confirm('发现新版本，是否立即更新？')) {
                                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.error('❌ Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
</head>

<body class="index-page">

    <!-- 主题切换按钮 -->
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <!-- 主容器 -->
    <div class="main-container">

        <!-- 模块一：本地图库 -->
        <div class="card module-card animate-fade-in">
            <div class="card-header">
                <div class="header-main">
                    <h2 class="card-title"><i class="fas fa-server"></i> 本地图库</h2>
                    <!-- 环境切换器 -->
                    <div class="env-selector" id="env-component" onclick="toggleDropdown()">
                        <span id="selected-env-text" class="env-badge">加载中...</span>
                        <i class="fas fa-chevron-down"></i>
                        <div class="env-dropdown-list" id="env-dropdown-menu">
                            <a href="#" data-env="dev" class="env-dropdown-option"
                                onclick="selectEnvironment('dev'); event.stopPropagation();">开发环境</a>
                            <a href="#" data-env="test" class="env-dropdown-option"
                                onclick="selectEnvironment('test'); event.stopPropagation();">测试环境</a>
                            <a href="#" data-env="prod" class="env-dropdown-option"
                                onclick="selectEnvironment('prod'); event.stopPropagation();">生产环境</a>
                        </div>
                    </div>
                </div>
                <p class="env-stats" id="envStats">
                    <span class="loading-text"><i class="fas fa-spinner fa-spin"></i> 数据同步中...</span>
                </p>
            </div>

            <div class="button-grid">
                <a href="/showPic" class="action-card primary">
                    <div class="icon-box"><i class="fas fa-random"></i></div>
                    <span class="label">随机图片</span>
                </a>
                <a href="/randomGallery" class="action-card warm">
                    <div class="icon-box"><i class="fas fa-th-large"></i></div>
                    <span class="label">随机画廊</span>
                </a>
                <a href="#" id="randomGroupBtn" class="action-card accent">
                    <div class="icon-box"><i class="fas fa-layer-group"></i></div>
                    <span class="label">随机套图</span>
                </a>
                <a href="/groupList" class="action-card neutral">
                    <div class="icon-box"><i class="fas fa-list-ul"></i></div>
                    <span class="label">分组列表</span>
                </a>
            </div>
        </div>

        <!-- 模块二：精选收藏 -->
        <div class="card module-card animate-fade-in delay-100">
            <div class="card-header">
                <div class="header-main">
                    <h2 class="card-title"><i class="fas fa-cloud-download-alt"></i> 精选收藏</h2>
                    <!-- 隐私模式切换 (Inline) -->
                    <button class="privacy-btn" id="privacyToggle" onclick="togglePrivacy()" title="切换隐私模式">
                        <i class="fas fa-eye" id="privacyIcon"></i>
                        <span id="privacyText">隐私模式</span>
                    </button>
                </div>
                <p class="card-subtitle">XHS 解析与精选动图资源</p>
            </div>

            <div class="button-grid">
                <a href="/randomGif" class="action-card success" id="randomGifBtn">
                    <div class="icon-box"><i class="fas fa-film"></i></div>
                    <span class="label">随机动图</span>
                </a>
                <a href="/downloadList" class="action-card info">
                    <div class="icon-box"><i class="fas fa-images"></i></div>
                    <span class="label">下载浏览</span>
                </a>
                <a href="/download" class="action-card warning" style="grid-column: span 2;">
                    <div class="icon-box"><i class="fas fa-file-download"></i></div>
                    <span class="label">图片下载管理</span>
                </a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let toastTimer;

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            clearTimeout(toastTimer);
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            toastTimer = setTimeout(function () {
                toast.className = 'toast';
            }, 3000);
        }

        // Dropdown Logic - Restored to robust ID-based approach
        function toggleDropdown() {
            // Stop propagation if event is passed (defensive), but mainly rely on ID toggle
            const selector = document.getElementById('env-component');
            selector.classList.toggle('active');
        }

        function selectEnvironment(targetEnv) {
            // Dropdown closing is handled by parent click or outside click
            const selector = document.getElementById('env-component');
            selector.classList.remove('active');
            switchEnvironment(targetEnv);
        }

        // Close dropdown when clicking outside
        window.onclick = function (event) {
            const selector = document.getElementById('env-component');
            if (selector && !selector.contains(event.target)) {
                selector.classList.remove('active');
            }
        }

        async function updateEnvStatus() {
            try {
                // Get environment details
                const response = await fetch('/api/system/env/currentInfo');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const result = await response.json();
                const data = result.data;
                const currentEnv = data.env;

                // Update Selector Text
                const selectedEnvText = document.getElementById('selected-env-text');
                const envMap = { dev: '开发环境', test: '测试环境', prod: '生产环境' };
                selectedEnvText.textContent = envMap[currentEnv] || "未知环境";

                // Update Active State in Menu
                document.querySelectorAll('.env-dropdown-option').forEach(item => {
                    if (item.dataset.env === currentEnv) item.classList.add('active');
                    else item.classList.remove('active');
                });

                // Update Stats
                const envStats = document.getElementById('envStats');
                envStats.innerHTML = `
                    <i class="fas fa-database"></i> 分组: ${data.groupCount || 0}
                    <span style="margin: 0 8px; color: var(--color-border);">|</span>
                    <i class="fas fa-image"></i> 图片: ${data.picCount || 0}
                `;

            } catch (error) {
                console.error("Failed to get env status:", error);
                document.getElementById('selected-env-text').textContent = "获取失败";
                document.getElementById('envStats').innerHTML = '<span class="error-text">无法连接服务器</span>';
            }
        }

        async function switchEnvironment(targetEnv) {
            const envMap = { dev: '开发环境', test: '测试环境', prod: '生产环境' };
            showToast(`正在切换到 ${envMap[targetEnv] || targetEnv}...`, 'info');
            try {
                const response = await fetch('/api/system/env/' + targetEnv);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const result = await response.json();
                if (result.code === 200) {
                    await updateEnvStatus();
                    showToast(`环境已切换`, 'success');
                } else {
                    throw new Error(result.message || '切换失败');
                }
            } catch (error) {
                console.error("Switch env failed:", error);
                showToast("切换失败: " + error.message, "error");
            }
        }

        document.addEventListener('DOMContentLoaded', updateEnvStatus);

        document.getElementById('randomGroupBtn').addEventListener('click', function (e) {
            e.preventDefault();
            fetch('/api/group/randomGroupInfo')
                .then(response => response.json())
                .then(result => {
                    if (result.code === 200 && result.data && result.data.groupId) {
                        window.location.href = '/showPicList?groupId=' + result.data.groupId + '&groupName=' + encodeURIComponent(result.data.groupName || '随机套图');
                    } else {
                        window.location.href = '/showPicList';
                    }
                })
                .catch(() => window.location.href = '/showPicList');
        });

        // Theme Toggle
        function toggleTheme() {
            const newTheme = window.themeManager.toggle();
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const themeIcon = document.getElementById('themeIcon');
            if (themeIcon) {
                themeIcon.className = theme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
                themeIcon.parentElement.title = theme === 'light' ? '切换到深色模式' : '切换到浅色模式';
            }
        }

        // Privacy Mode Toggle
        async function togglePrivacy() {
            try {
                const btn = document.getElementById('privacyToggle');
                const icon = document.getElementById('privacyIcon');
                const isEnabled = icon.classList.contains('fa-eye'); // Currently visible -> requesting hidden (privacy enabled)

                const response = await fetch('/api/system/privacy-mode?enabled=' + isEnabled);
                if (response.ok) {
                    const result = await response.json();
                    if (result.code === 200) {
                        updatePrivacyIcon(isEnabled);
                        showToast(result.message, 'success');
                    } else {
                        showToast(result.message || '操作失败', 'error');
                    }
                }
            } catch (error) {
                console.error("Toggle privacy failed:", error);
                showToast("操作失败", 'error');
            }
        }

        function updatePrivacyIcon(privacyEnabled) {
            const btn = document.getElementById('privacyToggle');
            const icon = document.getElementById('privacyIcon');
            const text = document.getElementById('privacyText');
            const gifBtn = document.getElementById('randomGifBtn');

            if (privacyEnabled) {
                // Privacy ON
                icon.className = 'fas fa-eye-slash';
                btn.classList.add('active');
                icon.style.color = '#ff6b6b';
                text.textContent = "隐私开启";
                btn.title = "关闭隐私模式";

                // Disable GIF Button
                gifBtn.classList.add('disabled');
                gifBtn.removeAttribute('href'); // Remove link to ensure no navigation
            } else {
                // Privacy OFF
                icon.className = 'fas fa-eye';
                btn.classList.remove('active');
                icon.style.color = '';
                text.textContent = "隐私模式";
                btn.title = "开启隐私模式";

                // Enable GIF Button
                gifBtn.classList.remove('disabled');
                gifBtn.setAttribute('href', '/randomGif');
            }
        }

        async function initPrivacyStatus() {
            try {
                const response = await fetch('/api/system/privacy-mode');
                if (response.ok) {
                    const result = await response.json();
                    if (result.code === 200) {
                        updatePrivacyIcon(result.data);
                    }
                }
            } catch (e) { }
        }

        document.addEventListener('DOMContentLoaded', function () {
            updateThemeIcon(window.themeManager.get());
            initPrivacyStatus();
        });
    </script>

    <!-- PWA Service Worker 注册 -->



    <!-- 移动端自动缩放适配脚本 -->
    <script>
        (function () {
            // 只有在首页且是移动端（或需要缩放的小屏幕）才执行
            function fitContent() {
                const container = document.querySelector('.home-container');
                if (!container) return;

                // 重置 transform 以便获取自然尺寸
                container.style.transform = 'none';

                const viewportW = window.innerWidth;
                const viewportH = window.innerHeight;

                // 获取容器的自然尺寸
                // 注意：由于设置了 padding: 20px，offsetWidth 包含了 padding
                const contentW = container.offsetWidth;
                const contentH = container.offsetHeight;

                // 计算需要的缩放比例
                // 留出一点边距 (Safe area)
                const safePadding = 10;
                const availableW = viewportW - safePadding * 2;
                const availableH = viewportH - safePadding * 2;

                const scaleX = availableW / contentW;
                const scaleY = availableH / contentH;

                // 取最小值作为缩放比例，确保完整显示
                // 只有当需要缩小时才缩小 (scale < 1)
                // 或者用户希望始终填满屏幕？ "缩放 在一个页面显示所有" -> 意味着即使屏幕很大，也可以保持 1 或者适当放大？
                // 通常只处理缩小的情况，防止在大屏幕上变得过大
                // 但是在小屏幕手机上，必须缩小
                let scale = Math.min(scaleX, scaleY);

                // 稍微限制一下放大的最大倍数，防止模糊
                if (scale > 1.2) scale = 1.2;

                // 应用缩放
                // container.style.transformOrigin = 'center center'; // 已由 flex 居中
                container.style.transform = `scale(${scale})`;
            }

            // 初始化
            window.addEventListener('load', fitContent);
            window.addEventListener('resize', fitContent);

            // 针对某些特定的移动端方向变化
            window.addEventListener('orientationchange', function () {
                setTimeout(fitContent, 100);
            });

            // 立即执行一次
            if (document.readyState === 'complete') {
                fitContent();
            }
        })();
    </script>
</body>

</html>
